name: CI

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest)
        # The app default DATABASE_URL is an absolute dev-container path that does
        # not exist on the runner; point SQLite at the repo-relative data/ dir
        # (kept via data/.gitkeep) so the DB file can be created.
        env:
          DATABASE_URL: "sqlite:///./data/app.db"
        run: python -m pytest
