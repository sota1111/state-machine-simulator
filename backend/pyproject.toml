[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# Use ruff's default rule set (pyflakes F + a curated pycodestyle E subset).
# Keep it minimal — do not broaden to all of E/W to avoid pre-existing noise.
# E712: `== False` comparisons are the idiomatic way to build SQLAlchemy filter
# expressions (the suggested `if not` rewrite changes query semantics).
ignore = ["E712"]

[tool.ruff.lint.per-file-ignores]
# Package re-exports.
"__init__.py" = ["F401"]
